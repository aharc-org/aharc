<!DOCTYPE html>
<html lang="en">
<!--generic v0 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pagefind/pagefind-ui.css"> 
    <link rel="stylesheet" href="../css/custom.css"> <!--load last --> v1 -->
    <title>Search Alderholt Archives</title>

</head>
<body>

    <header>
    <div class="site-title">Alderholt Archives</div>
    </header>


    <nav>
        <a href="../index.html" aria-current="page">Home</a>
        <a href="2025-08-The-Cripplestyle-Benches/index.html"></a>
        <a href="../contact.html">Contact</a>
    </nav>

    <main>


    <section class="myPagefind-container">
        <section class="myPagefind-item">
            <div id="search"></div>
        </section>
    </section>

    <script src="pagefind/pagefind.js"></script>
    <script src="pagefind/pagefind-ui.js"></script>
    <script>
    window.addEventListener('DOMContentLoaded', () => {
        new PagefindUI({
            element: "#search",
            showSubResults: false,
            snippetLength: 0,
            excerptLength: 0,
            processResult: (result) => {
                if (result.meta.description) {
                    result.snippet = result.meta.description;  // replace snippet
                }
                return result;
            }
        });
    });
    </script>



    </main>
       
    <footer>
      <div id="footer-placeholder">
        <div class="item-footer">
          <p>© 2025 Alderholt Archives Ref: ns</p> <!-- fallback content -->
        </div>
      </div>
    </footer>

    <script>
      fetch('footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer-placeholder').innerHTML = data; // replaces fallback
        })
        .catch(error => console.error('Error loading footer:', error));
    </script>

</body>
</html>
